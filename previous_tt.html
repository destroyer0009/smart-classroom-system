<!DOCTYPE html>
<html>

<head>

<title>Previous Year Timetable</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
text-align:center;
}

.header{
background:#002147;
color:white;
padding:20px;
}

.section{
margin-top:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
background:#1b3a6b;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#002147;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
width:90%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#002147;
color:white;
}

</style>

</head>

<body>

<div class="header">
<h1>Previous Year Timetable</h1>
</div>


<div class="section">

<h2>Winter 2024</h2>

<button onclick="loadTT('winter2024','Sem3')">Sem 3</button>
<button onclick="loadTT('winter2024','Sem5')">Sem 5</button>
<button onclick="loadTT('winter2024','Sem7')">Sem 7</button>

</div>


<div class="section">

<h2>Summer 2024</h2>

<button onclick="loadTT('summer2024','Sem4')">Sem 4</button>
<button onclick="loadTT('summer2024','Sem6')">Sem 6</button>

</div>


<table>

<tr>
<th>Day</th>
<th>8:30-9:30</th>
<th>9:30-10:30</th>
<th>10:30-10:40</th>
<th>10:40-11:40</th>
<th>11:40-12:40</th>
<th>12:40-1:20</th>
<th>1:20-2:20</th>
<th>2:20-3:20</th>
<th>3:20-4:20</th>
<th>4:20-5:20</th>
</tr>

<tbody id="ttBody"></tbody>

</table>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAFSLRyN4W5VRg4atDPq7Pae0Kl8-RVP30",
authDomain: "smart-classroom-allocation.firebaseapp.com",
databaseURL: "https://smart-classroom-allocation-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "smart-classroom-allocation"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);



window.loadTT=function(term,sem){

const table=document.getElementById("ttBody");

const refPath=ref(db,"previous_timetables/"+term+"/"+sem);

get(refPath).then(snapshot=>{

table.innerHTML="";

if(!snapshot.exists()){

table.innerHTML="<tr><td colspan='11'>No timetable found</td></tr>";
return;

}

const data=snapshot.val();

const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

days.forEach(day=>{

const d=data[day] || {};

table.innerHTML+=`

<tr>

<td>${day}</td>

<td>${d.s1||"-"}</td>
<td>${d.s2||"-"}</td>
<td>${d.s3||"-"}</td>
<td>${d.s4||"-"}</td>
<td>${d.s5||"-"}</td>
<td>${d.s6||"-"}</td>
<td>${d.s7||"-"}</td>
<td>${d.s8||"-"}</td>
<td>${d.s9||"-"}</td>
<td>${d.s10||"-"}</td>

</tr>

`;

});

});

}

</script>

</body>
</html>
