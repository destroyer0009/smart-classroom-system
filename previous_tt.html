<!DOCTYPE html>
<html>

<head>

<title>Previous Year Timetable</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
text-align:center;
}

.header{
background:#002147;
color:white;
padding:20px;
}

.section{
margin-top:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
background:#1b3a6b;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#002147;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
width:90%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#002147;
color:white;
}

th:nth-child(4),
th:nth-child(7){
background:#ddd;
font-style:italic;
}

.breakCell{
writing-mode: vertical-rl;
text-align:center;
vertical-align:middle;
font-weight:bold;
background:#ffeeba;
color:#856404;
letter-spacing:2px;
}
table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
width:90%;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

td{
padding:12px;
}

tr:hover{
background:#eef5ff;
transition:0.2s;
}

th{
background:linear-gradient(135deg,#002147,#1b3a6b);
color:white;
}
</style>

</head>

<body>

<div class="header">
<h1>Previous Year Timetable</h1>
</div>
<div style="
display:flex;
flex-direction:column;
align-items:center;
margin-top:25px;
">

<!-- BUTTON ROW -->
<div style="
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:10px;
">

<button onclick="window.location.href='admin.html'" style="
padding:10px 22px;
background:#6c757d;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
"
onmouseover="this.style.transform='scale(1.05)'"
onmouseout="this.style.transform='scale(1)'"
>
⬅ Back
</button>

<button onclick="refreshData()" style="
padding:10px 22px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
"
>
🔄 Refresh
</button>

</div>

<!-- NOTE -->
<p style="
font-size:13px;
color:#777;
background:#fff3cd;
padding:8px 15px;
border-radius:8px;
">
⚠ Do not include s3 (BREAK) and s6 (LUNCH)
</p>

</div>

</div>




</div>


<h2 style="margin-top:30px;">📄 Previous Timetables</h2>

<select id="termSelect" onchange="loadPDF()" style="
padding:12px;
border-radius:8px;
margin:15px;
min-width:200px;
">
<option value="">Select Term</option>
</select>

<iframe id="pdfFrame"
width="90%"
height="600px"
style="border:none; border-radius:10px;">
</iframe>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAXNrkME8ssbzJxfUrEpzSNDCa7MEpOgrY",
  authDomain: "sample-final-proj.firebaseapp.com",
  databaseURL: "https://sample-final-proj-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "sample-final-proj",
  storageBucket: "sample-final-proj.firebasestorage.app",
  messagingSenderId: "215816969558",
  appId: "1:215816969558:web:efe3040d393e5ee26a0af7",

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);




import { onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";



window.refreshData = function(){
location.reload();
}

// 🔹 Load terms from DB
onValue(ref(db,"timetable_pdf/previous"), (snapshot)=>{

const select = document.getElementById("termSelect");

select.innerHTML = "<option value=''>Select Term</option>";

if(snapshot.exists()){
  let firstTerm = null;

  snapshot.forEach(child=>{
    if(!firstTerm) firstTerm = child.key;

    select.innerHTML += `<option value="${child.key}">${child.key}</option>`;
  });

  // 🔥 AUTO LOAD FIRST TERM
  if(firstTerm){
    select.value = firstTerm;
    loadPDF();
  }
}

});

// 🔹 Load selected PDF
window.loadPDF = async function(){

const term = document.getElementById("termSelect").value;

if(!term) return;

const snap = await get(ref(db,"timetable_pdf/previous/" + term));

if(snap.exists()){
  document.getElementById("pdfFrame").src = snap.val();
}else{
  alert("No PDF found");
}

}
</script>

</body>
</html>
