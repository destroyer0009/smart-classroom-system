<!DOCTYPE html>
<html>

<head>

<title>Previous Year Timetable</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
text-align:center;
}

.header{
background:#002147;
color:white;
padding:20px;
}

.section{
margin-top:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
background:#1b3a6b;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#002147;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
width:90%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#002147;
color:white;
}

th:nth-child(4),
th:nth-child(7){
background:#ddd;
font-style:italic;
}

.breakCell{
writing-mode: vertical-rl;
text-align:center;
vertical-align:middle;
font-weight:bold;
background:#ffeeba;
color:#856404;
letter-spacing:2px;
}
table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
width:90%;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

td{
padding:12px;
}

tr:hover{
background:#eef5ff;
transition:0.2s;
}

th{
background:linear-gradient(135deg,#002147,#1b3a6b);
color:white;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="header">
<h1>Previous Year Timetable</h1>
</div>
<div style="
display:flex;
flex-direction:column;
align-items:center;
margin-top:25px;
">

<!-- BUTTON ROW -->
<div style="
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:10px;
">

<button onclick="window.location.href='index.html'" style="
padding:10px 22px;
background:#6c757d;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
"
onmouseover="this.style.transform='scale(1.05)'"
onmouseout="this.style.transform='scale(1)'"
>
⬅ Back
</button>

<button onclick="refreshData()" style="
padding:10px 22px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
"
>
🔄 Refresh
</button>

<button onclick="toggleUpload()" style="
padding:10px 22px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
"
>
➕ Add TT
</button>

<button onclick="downloadSample()" style="
padding:10px 22px;
background:#17a2b8;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
"
>
⬇ Sample
</button>

</div>

<!-- NOTE -->
<p style="
font-size:13px;
color:#777;
background:#fff3cd;
padding:8px 15px;
border-radius:8px;
">
⚠ Do not include s3 (BREAK) and s6 (LUNCH)
</p>

</div>

</div>

<div class="section">
<h2>Select Term & Semester</h2>
<div style="
text-align:center;
margin-top:40px;
">

<h2 style="
font-size:30px;
color:#002147;
margin-bottom:20px;
">
📅 Select Term & Semester
</h2>

<div style="
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
">

<select id="termSelect" onchange="loadSemesters()" style="
padding:12px 20px;
border-radius:10px;
border:1px solid #ccc;
min-width:200px;
font-size:15px;
">

<option value="">Select Term</option>

</select>

<select id="semSelect" onchange="loadTTDynamic()" style="
padding:12px 20px;
border-radius:10px;
border:1px solid #ccc;
min-width:200px;
font-size:15px;
">

<option value="">Select Semester</option>

</select>

</div>


</div>


</div>

<div id="uploadSection" style="display:none; margin-top:30px;">

<div style="
max-width:350px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
">

<h2 style="
color:#002147;
margin-bottom:20px;
">
📂 Upload Previous Timetable
</h2>

<!-- FILE INPUT -->
<input type="file" id="prevExcelFile" accept=".xlsx,.xls" style="
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
background:#f9f9f9;
">

<!-- TERM INPUT -->
<input id="prevTermInput" placeholder="Enter Term (winter2026 / summer2026)" style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
">

<!-- SEM SELECT -->
<select id="prevSemInput" style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
">

<option value="">Select Semester</option>

</select>

<!-- BUTTON -->
<button onclick="uploadPreviousExcel()" style="
width:100%;
padding:12px;
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
"
onmouseover="this.style.transform='scale(1.03)'"
onmouseout="this.style.transform='scale(1)'"
>
🚀 Upload Timetable
</button>

<!-- MESSAGE -->
<p id="uploadMsg" style="
margin-top:15px;
font-weight:bold;
color:green;
text-align:center;
"></p>

</div>

</div>
<table>

<tr>
<th>Day</th>
<th>8:30-9:30</th>
<th>9:30-10:30</th>

<th>10:30-10:40</th> <!-- BREAK -->

<th>10:40-11:40</th>
<th>11:40-12:40</th>

<th>12:40-1:20</th> <!-- LUNCH -->

<th>1:20-2:20</th>
<th>2:20-3:20</th>
<th>3:20-4:20</th>
</tr>

<tbody id="ttBody"></tbody>

</table>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAXNrkME8ssbzJxfUrEpzSNDCa7MEpOgrY",
  authDomain: "sample-final-proj.firebaseapp.com",
  databaseURL: "https://sample-final-proj-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "sample-final-proj",
  storageBucket: "sample-final-proj.firebasestorage.app",
  messagingSenderId: "215816969558",
  appId: "1:215816969558:web:efe3040d393e5ee26a0af7",

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);



window.loadTTDynamic = function(){

const term = document.getElementById("termSelect").value;
const sem = document.getElementById("semSelect").value;

const table = document.getElementById("ttBody");

if(!term || !sem){
table.innerHTML="";
return;
}

get(ref(db,`previous_timetables/${term}/${sem}`)).then(snapshot=>{

table.innerHTML="";

if(!snapshot.exists()){
table.innerHTML="<tr><td colspan='11'>No timetable found</td></tr>";
return;
}

const data = snapshot.val();

const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let firstRow = true;

days.forEach(day=>{

const d = data[day] || {};

table.innerHTML += `
<tr>

<td>${day}</td>

<td>${d.s1||"-"}</td>
<td>${d.s2||"-"}</td>

${firstRow ? `<td rowspan="6" class="breakCell">BREAK</td>` : ""}

<td>${d.s4||"-"}</td>
<td>${d.s5||"-"}</td>

${firstRow ? `<td rowspan="6" class="breakCell">LUNCH</td>` : ""}

<td>${d.s7||"-"}</td>
<td>${d.s8||"-"}</td>
<td>${d.s9||"-"}</td>

</tr>
`;

firstRow = false;

});

});
}
import { onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

onValue(ref(db,"previous_timetables"), snapshot=>{

const select = document.getElementById("termSelect");

select.innerHTML = "<option value=''>Select Term</option>";

if(!snapshot.exists()){
  semSelect.innerHTML += `<option>No Data</option>`;
  return;
}

snapshot.forEach(child=>{
  select.innerHTML += `<option value="${child.key}">${child.key}</option>`;
});

});

window.loadSemesters = function(){

const term = document.getElementById("termSelect").value.toLowerCase();
const semSelect = document.getElementById("semSelect");

semSelect.innerHTML = "<option value=''>Select Semester</option>";
document.getElementById("ttBody").innerHTML="";

if(!term) return;

let allowedSems = [];

// 🔥 MAIN LOGIC
if(term.includes("winter")){
  allowedSems = ["Sem3","Sem5","Sem7"];
}
else if(term.includes("summer")){
  allowedSems = ["Sem2","Sem4","Sem6"];
}
else{
  return;
}

// 🔥 Now check DB and show only valid ones
get(ref(db,"previous_timetables/"+term)).then(snapshot=>{

if(!snapshot.exists()) return;

snapshot.forEach(child=>{

if(allowedSems.includes(child.key)){
  semSelect.innerHTML += `<option value="${child.key}">${child.key}</option>`;
}

});

});

}
window.refreshData = function(){
location.reload();
}

// 👇 ADD HERE
document.getElementById("prevTermInput").addEventListener("input", function(){

const term = this.value.toLowerCase();
const semSelect = document.getElementById("prevSemInput");

semSelect.innerHTML = "<option value=''>Select Semester</option>";

let sems = [];

if(term.includes("winter")){
  sems = ["Sem3","Sem5","Sem7"];
}
else if(term.includes("summer")){
  sems = ["Sem2","Sem4","Sem6"];
}

sems.forEach(sem=>{
  semSelect.innerHTML += `<option value="${sem}">${sem}</option>`;
});

});

window.uploadPreviousExcel = async function(){

const file = document.getElementById("prevExcelFile").files[0];
const term = document.getElementById("prevTermInput").value;
const sem = document.getElementById("prevSemInput").value;

if(!file || !term || !sem){
alert("Fill all fields");
return;
}

const data = await file.arrayBuffer();
const workbook = XLSX.read(data);

const sheet = workbook.Sheets[workbook.SheetNames[0]];
const json = XLSX.utils.sheet_to_json(sheet);

for(let row of json){

const {Day, Slot, Subject} = row;

if(!Day || !Slot) continue;

// skip break/lunch
if(Slot === "s3" || Slot === "s6") continue;

await set(ref(db,
`previous_timetables/${term}/${sem}/${Day}/${Slot}`),
Subject || "-"
);

}

document.getElementById("uploadMsg").innerHTML =
"✅ Uploaded successfully";

}

window.toggleUpload = function(){

const section = document.getElementById("uploadSection");

section.style.display = section.style.display === "none" ? "block" : "none";

}

window.downloadSample = function(){

// Sample data
const sample = [
  { Day: "Monday", Slot: "s1", Subject: "ADE (NAB)" },
  { Day: "Monday", Slot: "s2", Subject: "ADE (NAB)" },
  { Day: "Monday", Slot: "s4", Subject: "OE (CCA)" },
  { Day: "Tuesday", Slot: "s1", Subject: "MS (BTI)" },
  { Day: "Wednesday", Slot: "s5", Subject: "MIT (CRJ)" }
];

// Create worksheet
const ws = XLSX.utils.json_to_sheet(sample);

// Create workbook
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Sample");

// Download file
XLSX.writeFile(wb, "Sample_Timetable.xlsx");

}
</script>

</body>
</html>
