<!DOCTYPE html>
<html>

<head>

<body>

style="padding:8px 15px;">

</div>


<div style="padding:30px;">

<th>9:30-10:30</th>

</tr>

<tr>

<td id="Wednesday_830"></td>
<td id="Wednesday_930"></td>
<td id="Wednesday_1040"></td>
<td id="Wednesday_1140"></td>
<td id="Wednesday_120"></td>
<td id="Wednesday_220"></td>
<td id="Wednesday_320"></td>
</tr>

<tr>
<td><b>Thursday</b></td>

<tr>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAFSLRyN4W5VRg4atDPq7Pae0Kl8-RVP30",
authDomain: "smart-classroom-allocation.firebaseapp.com",
databaseURL: "https://smart-classroom-allocation-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "smart-classroom-allocation",
storageBucket: "smart-classroom-allocation.firebasestorage.app",
messagingSenderId: "31952362079",
appId: "1:31952362079:web:16fab8d8b9c29390fad9ea"

};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);



async function loadTimetable(){

const semester=document.getElementById("semesterSelect").value;

const refPath=ref(database,`semesters/${semester}/timetable`);

const snapshot=await get(refPath);


const slots=[
"8:30-9:30",
"9:30-10:30",
"10:40-11:40",
"11:40-12:40",
"1:20-2:20",
"2:20-3:20",
"3:20-4:20"
];

const days=[
"Monday",
"Tuesday",
"Wednesday",
"Thursday",
"Friday",
"Saturday"
];


/* CLEAR TABLE */

for(let day of days){

for(let slot of slots){

const id=
day+"_"+slot
.replace("8:30-9:30","830")
.replace("9:30-10:30","930")
.replace("10:40-11:40","1040")
.replace("11:40-12:40","1140")
.replace("1:20-2:20","120")
.replace("2:20-3:20","220")
.replace("3:20-4:20","320");

const cell=document.getElementById(id);

if(cell){
cell.innerHTML="-";
}

}

}


if(!snapshot.exists()){
return;
}

const data=snapshot.val();


/* FILL TIMETABLE */

for(let day in data){

for(let slot in data[day]){

const id=
day+"_"+slot
.replace("8:30-9:30","830")
.replace("9:30-10:30","930")
.replace("10:40-11:40","1040")
.replace("11:40-12:40","1140")
.replace("1:20-2:20","120")
.replace("2:20-3:20","220")
.replace("3:20-4:20","320");

const cell=document.getElementById(id);

if(!cell) continue;

cell.innerHTML=data[day][slot].subject+"<br>("+data[day][slot].faculty+")";

}

}

}


loadTimetable();

setInterval(loadTimetable,60000);

</script>

</body>
</html>
