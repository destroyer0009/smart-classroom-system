    background:white;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);

}

/* TABLE */
table{
    border-collapse:collapse;
    width:100%;
    font-size:13px;
}

/* HEADER */
th{
    background:#002147;
    color:white;
    padding:10px;
    font-weight:600;
}

/* CELLS */
td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #eee;
}

/* ROW HOVER */
tr:hover td{
    background:#f1f6ff;
}

/* DAY COLUMN */
td:first-child{
    font-weight:600;
    background:#f9fbff;
}

/* BREAK & LUNCH */
.break{
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-weight:bold;
    background:#f0f4fa;
    color:#002147;
    letter-spacing:1px;
}

/* SUBJECT STYLE */
td{
    line-height:1.4;
}

async function loadTimetable(){

const semester=document.getElementById("semesterSelect").value;

const snapshot=await get(ref(database,"semesters/"+semester+"/timetable"));

const days=[
"Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"
];

const slotMap = {
s1:"830",
s2:"930",
s3:"1040",
s4:"1140",
s5:"120",
s6:"220",
s7:"320"
};

const allSlots = ["830","930","1040","1140","120","220","320"];

/* CLEAR TABLE FIRST */

for(let day of days){

for(let s of allSlots){

const cell = document.getElementById(day + "_" + s);

if(cell){
cell.innerHTML = "-";
}

}

}

if(!snapshot.exists()) return;

const data=snapshot.val();

/* FILL DATA */

for(let day in data){

for(let slot in data[day]){

const id = day + "_" + slotMap[slot];

const cell = document.getElementById(id);

if(!cell) continue;

cell.innerHTML =
data[day][slot].subject + "<br>(" + data[day][slot].faculty + ")";

}

}

}

/* Fill timetable */

for(let day in data){

for(let slot in data[day]){

const id = day + "_" + slotMap[slot];

const cell = document.getElementById(id);

if(!cell) continue;

cell.innerHTML = data[day][slot].subject + "<br>(" + data[day][slot].faculty + ")";

}

}

}

loadTimetable();
document.getElementById("semesterSelect").addEventListener("change",loadTimetable);
