<!DOCTYPE html>
<html>

<head>
<title>College Timetable</title>
</head>

<body style="margin:0; font-family:Arial;">

<div style="
background:#002147;
color:white;
padding:20px;
text-align:center;
position:relative;
">

<h2>College Timetable</h2>

<button onclick="window.location.href='index.html'" style="
position:absolute;
right:20px;
top:15px;
padding:8px 16px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
">
Home
</button>

</div>

<div style="padding:20px; text-align:center;">

<h3>📄 Official Timetable</h3>

<iframe id="pdfFrame"
width="100%"
height="600px"
style="border:none;">
</iframe>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXNrkME8ssbzJxfUrEpzSNDCa7MEpOgrY",
  authDomain: "sample-final-proj.firebaseapp.com",
  databaseURL: "https://sample-final-proj-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "sample-final-proj",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const snap = await get(ref(db,"timetable_pdf/academic"));

if(snap.exists()){
  document.getElementById("pdfFrame").src = snap.val();
}else{
  document.body.innerHTML += "<p>No timetable uploaded</p>";
}

</script>

</body>
</html>
