const slots = [

];
const slotMap = {
"s1":"8:30-9:30",
"s2":"9:30-10:30",
"s3":"10:40-11:40",
"s4":"11:40-12:40",
"s5":"1:20-2:20",

"s8":"4:20-5:20"
};


function getCurrentDay(){

const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

return days[new Date().getDay()];

}


function getCurrentTimeSlot(){

  const now=new Date();
const current=now.getHours()*60+now.getMinutes();

const slotRanges=[

["s1",8*60+30,9*60+30],
["s2",9*60+30,10*60+30],
["s3",10*60+40,11*60+40],
["s4",11*60+40,12*60+40],
["s5",13*60+20,14*60+20],
["s6",14*60+20,15*60+20],
["s7",15*60+20,16*60+20],
["s8",16*60+20,17*60+20]

];

for(let slot of slotRanges){

if(current>=slot[1] && current<=slot[2]){
return slot[0];
}

}

return null;

}


function getNextSlot(currentSlot){

if(!currentSlot) return slots[0];

const index=slots.indexOf(currentSlot);

if(index!==-1 && index<slots.length-1){
return slots[index+1];
}

return null;

}


async function loadRooms(){

const container=document.getElementById("roomsContainer");

container.innerHTML="";

const day=getCurrentDay();

const currentSlot=getCurrentTimeSlot();


// const currentSlot = "s5"; // 🔥 FORCE TEST



// 🔴 GET LATE DATA
const lateSnapshot = await get(ref(database,"late_notifications"));

let lateData = [];

if(lateSnapshot.exists()){
  lateSnapshot.forEach(child=>{
    const data = child.val();

    const now = new Date();
    const today = now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,'0') + "-" +
    String(now.getDate()).padStart(2,'0');

    if(data.date === today){
      lateData.push(data);
    }
  });
}

for(let room of rooms){

 
let nextSlot = getNextSlot(currentSlot);
let currentSubject="No Lecture";
let currentFaculty="-";

let nextSubject="-";
let nextFaculty="-";

let status = "Free";
let color = "#d4edda"; // GREEN

let lecture = null;
let lectureSlot = null; // 🔥 IMPORTANT
const now = new Date();
const todayDate = now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,'0') + "-" +
String(now.getDate()).padStart(2,'0');

try {

  // 🔥 1. SPECIAL BOOKING
  // const specialSnap = await get(ref(database,
  // `classrooms/${room}/specialBookings/${todayDate}/${currentSlot}`));
const specialDaySnap = await get(ref(database,
`classrooms/${room}/specialBookings/${todayDate}`));

if(specialDaySnap.exists()){

  const specialData = specialDaySnap.val();

  if(currentSlot && specialData[currentSlot]){
    lecture = specialData[currentSlot];
    lectureSlot = currentSlot;
  }
  else{
    const firstSlot = Object.keys(specialData)[0];
    lecture = specialData[firstSlot];
    lectureSlot = firstSlot; // 🔥 IMPORTANT
  }
  if(!lectureSlot){
  lectureSlot = currentSlot;
}
}
if(lecture && !currentSlot){
  
  nextSubject = lecture.subject;
  nextFaculty = lecture.faculty;
}
// 🔥 FIX: use booked slot as NEXT
if(lecture && !currentSlot){
  nextSlot = lectureSlot;
}

  // 🔥 2. NORMAL TIMETABLE
  if(!lecture && currentSlot){
  const normalSnap = await get(ref(database,
  `classrooms/${room}/timetable/${day}/${currentSlot}`));

  if(normalSnap.exists()){
    lecture = normalSnap.val();
    lectureSlot = currentSlot;
  }
}
  } catch(e){}

  // 🔥 RESET SAFE DEFAULTS
if(!lecture){
  status = "Free";
  currentSubject = "No Lecture";
  currentFaculty = "-";
}

// 4️⃣ STATUS DECISION
if(lecture){

  // 🔥 DEFAULT BOOKED
  if(!currentSlot){
  status = "Booked";  // future lecture
}

  // 🔥 LIVE OVERRIDE (HIGHEST PRIORITY)
  const liveRef = ref(database,`classrooms/${room}/live`);
  const liveSnap = await get(liveRef);

  let liveExists = false;

if(liveSnap.exists()){
  const live = liveSnap.val();
  liveExists = true;

  if(live.status === "Ongoing" && lecture){
    status = "Ongoing";
    currentSubject = live.subject;
    currentFaculty = live.faculty;
  }
}

// ✅ WAITING SHOULD NOT DEPEND ON liveSnap
if(currentSlot && lecture && status !== "Ongoing"){
  status = "Waiting";  // current slot lecture
}

  // 🔥 NOW CHECK CANCEL (LOW PRIORITY)
  let isCancelled = false;

  if(lectureSlot){
    const cancelSnap = await get(ref(database,
    `cancelled_lectures/${todayDate}/${room}/${lectureSlot}`));

    if(cancelSnap.exists()){
      isCancelled = true;
    }
  }

  if(isCancelled && status !== "Ongoing"){
    status = "Cancelled";
  }

  // 🔔 LATE CHECK
  for(let late of lateData){
    if(late.room === room && late.slot === lectureSlot){
      status = "Late (" + late.minutes + "m)";
    }
  }
}
if(status === "Ongoing"){
  color = "#f8d7da"; // red
}
else if(status === "Waiting" || status === "Booked"){
  color = "#fff3cd"; // yellow
}
else if(status.includes("Late")){
  color = "#ffeeba";
}
else{
  color = "#d4edda"; // green
}
// ✅ move this OUTSIDE loop

// 🔥 ONLY fetch timetable if NO booking exists
if(nextSlot && !lecture){

  const nextRef = ref(database,
  `classrooms/${room}/timetable/${day}/${nextSlot}`);

  const nextSnap = await get(nextRef);

  if(nextSnap.exists()){
    nextSubject = nextSnap.val().subject;
    nextFaculty = nextSnap.val().faculty;
  }
}

let lateMessage = "";

for(let late of lateData){
  if(late.room === room && late.slot === lectureSlot){
    lateMessage = `⚠ ${late.teacher} is late by ${late.minutes} mins`;
  }
}

container.innerHTML+=`

<div onclick="openRoom('${room}')" 
style="
display:inline-block;
width:280px;
margin:20px;
padding:20px;

box-shadow:0 5px 15px rgba(0,0,0,0.2);

transition:0.3s;
"
onmouseover="this.style.transform='scale(1.05)'"
onmouseout="this.style.transform='scale(1)'">

<h2 style="color:#002147;">${room}</h2>

<p>
<b>Status:</b> 
<span style="
padding:5px 10px;
border-radius:10px;
background:${
  status==='Ongoing' ? '#dc3545' :
  status.includes('Late') ? '#ffc107' :
  status==='Waiting' ? '#ffc107' :
  '#28a745'
};
color:white;
font-weight:bold;
">
${status}
</span>
</p>
${lateMessage ? `<p style="color:red;"><b>${lateMessage}</b></p>` : ""}
<hr>

<p><b>Current:</b> ${currentSubject}</p>
<p><b>Faculty:</b> ${currentFaculty}</p>
<p><b>Time:</b> ${currentSlot ? slotMap[currentSlot] : "Outside Class Hours"}</p>

<hr>

<p><b>Next:</b> ${nextSubject}</p>
<p><b>Faculty:</b> ${nextFaculty}</p>
<p><b>Time:</b> ${nextSlot ? slotMap[nextSlot] : "-"}</p>

</div>

`;


}


console.log("Rooms loading...");
}

window.login = async function(){

  const id = document.getElementById("teacherID").value;
  const pass = document.getElementById("teacherPass").value;

  const snapshot = await get(ref(database,"teachers/" + id));

  if(!snapshot.exists()){
    document.getElementById("loginMsg").innerHTML = "Invalid ID";
    return;
  }

  let dbPass = snapshot.val().password;

  try{
    dbPass = atob(dbPass); // decode if encrypted
  }catch(e){
    // old password (not encoded)
  }

  if(dbPass === pass){
    localStorage.setItem("teacherID", id);
    window.location.href = "teacher.html";
  }else{
    document.getElementById("loginMsg").innerHTML = "Wrong Password";
  }

}

/* ROOM FUTURE LECTURES */

window.openRoom = async function(room){

document.getElementById("roomModal").style.display="flex";
document.getElementById("roomTitle").innerHTML = room + " Today's Lectures";

const container = document.getElementById("futureLectures");
container.innerHTML = "Loading...";

const day = getCurrentDay();
const now = new Date();
const todayDate = now.getFullYear() + "-" +

String(now.getMonth()+1).padStart(2,'0') + "-" +
String(now.getDate()).padStart(2,'0');

const currentSlot = getCurrentTimeSlot(); // ✅ separate line

// 🔹 Get timetable + special
const timetableSnap = await get(ref(database,
`classrooms/${room}/timetable/${day}`));

const specialSnap = await get(ref(database,
`classrooms/${room}/specialBookings/${todayDate}`));

let timetableData = timetableSnap.exists() ? timetableSnap.val() : {};
let specialData = specialSnap.exists() ? specialSnap.val() : {};

container.innerHTML = "";

const slotOrder = ["s1","s2","s3","s4","s5","s6","s7","s8"];

let hasLecture = false;

// 🔥 LOOP ALL SLOTS (IMPORTANT)
for(let slot of slotOrder){

  let lecture = null;

  // 🔥 PRIORITY: special booking
  if(specialData[slot]){
    lecture = specialData[slot];
  }
  else if(timetableData[slot]){
    lecture = timetableData[slot];
  }

  if(lecture){

  // 🔥 OUTSIDE HOURS:

    hasLecture = true;

    let tag = specialData[slot] ? " (Booked)" : "";

    container.innerHTML += `
      <div style="
        padding:10px;
        margin:6px;
        border-radius:6px;
        background:#f8f9fa;
        border-left:5px solid ${specialData[slot] ? "#17a2b8" : "#007bff"};
      ">
        <b>${slotMap[slot]}</b><br>
        ${lecture.subject} (${lecture.faculty}) ${tag}
      </div>
    `;
  }
}

// 🔥 FINAL CHECK
if(!hasLecture){
  container.innerHTML = "No lectures scheduled today";
}
}

const snapshot = await get(ref(database,"marks"));
const select = document.getElementById("subject");

// Load subjects
if(snapshot.exists()){
const data = snapshot.val();

for(let subject in data){
select.innerHTML += `<option>${subject}</option>`;
}
}

};
window.getStudentMarks = async function(){

const subject = document.getElementById("subject").value;

if(!subject){
alert("Select subject");
return;
}

const snap = await get(ref(database, "marks/" + subject));

let html = `
<table border="1" style="margin:auto; border-collapse:collapse;">
<tr style="background:#002147; color:white;">
<th>Student ID</th>
<th>Marks</th>
</tr>
`;

if(snap.exists()){
snap.forEach(child=>{
const data = child.val();

html += `
<tr>
<td>${child.key}</td>
<td>${data.midsem}</td>
</tr>
`;
});
}else{
html += `<tr><td colspan="2">No data</td></tr>`;
}

html += "</table>";

document.getElementById("result").innerHTML = html;

};
window.goHome = function(){
location.reload(); // reloads original home page
};
window.logoutAdmin = function(){
  localStorage.removeItem("adminLoggedIn");
  location.reload();
