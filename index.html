};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
/* LIVE NOTICE FROM FIREBASE */

const noticeRef = ref(database,"notice/current");

onValue(noticeRef,(snapshot)=>{

const container=document.getElementById("noticeSlider");

container.innerHTML="";

if(!snapshot.exists()){
container.innerHTML="<span>No Notice</span>";
return;
}

const now=new Date();

snapshot.forEach(child=>{

const data=child.val();

const expiry=new Date(data.expiry);

if(now < expiry){

container.innerHTML += `<span>📢 ${data.message} | </span>`;

}

});

});
const rooms = ["LAB31","CR125","CR126"];

const slots = [
"s1","s2","s3","s4","s5","s6","s7","s8"
];
const slotMap = {
"s1":"8:30-9:30",
"s2":"9:30-10:30",
"s3":"10:40-11:40",
"s4":"11:40-12:40",
"s5":"1:20-2:20",
"s6":"2:20-3:20",
"s7":"3:20-4:20",
"s8":"4:20-5:20"
};


function getCurrentDay(){

const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

return days[new Date().getDay()];

}


function getCurrentTimeSlot(){

  const now=new Date();
const current=now.getHours()*60+now.getMinutes();

const slotRanges=[

["s1",8*60+30,9*60+30],
["s2",9*60+30,10*60+30],
["s3",10*60+40,11*60+40],
["s4",11*60+40,12*60+40],
["s5",13*60+20,14*60+20],
["s6",14*60+20,15*60+20],
["s7",15*60+20,16*60+20],
["s8",16*60+20,17*60+20]

];

for(let slot of slotRanges){

if(current>=slot[1] && current<=slot[2]){
return slot[0];
}

}

return null;

}


function getNextSlot(currentSlot){

if(!currentSlot) return slots[0];

const index=slots.indexOf(currentSlot);

if(index!==-1 && index<slots.length-1){
return slots[index+1];
}

return null;

}


async function loadRooms(){

const container=document.getElementById("roomsContainer");

container.innerHTML="";

const day=getCurrentDay();

const currentSlot=getCurrentTimeSlot();

const nextSlot=getNextSlot(currentSlot);

// 🔴 GET LATE DATA
const lateSnapshot = await get(ref(database,"late_notifications"));

let lateData = [];

if(lateSnapshot.exists()){
  lateSnapshot.forEach(child=>{
    const data = child.val();

    const now = new Date();
    const today = now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,'0') + "-" +
    String(now.getDate()).padStart(2,'0');

    if(data.date === today){
      lateData.push(data);
    }
  });
}

for(let room of rooms){

 

let currentSubject="No Lecture";
let currentFaculty="-";

let nextSubject="-";
let nextFaculty="-";

let status = "Free";
let color = "#d4edda"; // GREEN

let lecture = null;
const todayDate = new Date().toISOString().split("T")[0];

// 1️⃣ CANCEL CHECK
const cancelSnap = await get(ref(database,
`cancelled_lectures/${todayDate}/${room}/${currentSlot}`));

if(cancelSnap.exists()){
  status = "Free";
  color = "#d4edda";
}

// 2️⃣ SPECIAL BOOKING
else{
  const specialSnap = await get(ref(database,
  `classrooms/${room}/specialBookings/${todayDate}/${currentSlot}`));

  if(specialSnap.exists()){
    lecture = specialSnap.val();
  }

  // 3️⃣ NORMAL TIMETABLE
  else{
    const normalSnap = await get(ref(database,
    `classrooms/${room}/timetable/${day}/${currentSlot}`));

    if(normalSnap.exists()){
      lecture = normalSnap.val();
    }
  }

  // 4️⃣ STATUS DECISION
  if(lecture){

    const liveRef = ref(database,`classrooms/${room}/live`);
    const liveSnap = await get(liveRef);

    if(liveSnap.exists() && liveSnap.val().status === "Ongoing"){
      status = "Ongoing";
      color = "#dc3545";
      currentSubject = liveSnap.val().subject;
      currentFaculty = liveSnap.val().faculty;
    }

    else{
      status = "Waiting";
      color = "#ffc107";

      // 🔔 CHECK LATE
      for(let late of lateData){
        if(late.room === room &&
           late.slot === currentSlot){
          status = "Late (" + late.minutes + "m)";
        }
      }

      currentSubject = lecture.subject;
      currentFaculty = lecture.faculty;
    }

  }else{
    status = "Free";
    color = "#d4edda";
  }
}

if(nextSlot){

const nextRef = ref(database,
`classrooms/${room}/timetable/${day}/${nextSlot}`);

const nextSnap = await get(nextRef);

if(nextSnap.exists()){
  nextSubject = nextSnap.val().subject;
  nextFaculty = nextSnap.val().faculty;
}

}

let lateMessage = "";

for(let late of lateData){
  if(late.room === room && late.slot === currentSlot){
    lateMessage = `⚠ ${late.teacher} is late by ${late.minutes} mins`;
  }
}

container.innerHTML+=`

<div onclick="openRoom('${room}')" 
style="
display:inline-block;
width:280px;
margin:20px;
padding:20px;
border-radius:15px;
background:${color};
box-shadow:0 5px 15px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.3s;
"
onmouseover="this.style.transform='scale(1.05)'"
onmouseout="this.style.transform='scale(1)'">

<h2 style="color:#002147;">${room}</h2>

<p>
<b>Status:</b> 
<span style="
padding:5px 10px;
border-radius:10px;
background:${
  status==='Ongoing' ? '#dc3545' :
  status.includes('Late') ? '#ffc107' :
  status==='Waiting' ? '#ffc107' :
  '#28a745'
};
color:white;
font-weight:bold;
">
${status}
</span>
</p>
${lateMessage ? `<p style="color:red;"><b>${lateMessage}</b></p>` : ""}
<hr>

<p><b>Current:</b> ${currentSubject}</p>
<p><b>Faculty:</b> ${currentFaculty}</p>
<p><b>Time:</b> ${currentSlot ? slotMap[currentSlot] : "Outside Class Hours"}</p>

<hr>

<p><b>Next:</b> ${nextSubject}</p>
<p><b>Faculty:</b> ${nextFaculty}</p>
<p><b>Time:</b> ${nextSlot ? slotMap[nextSlot] : "-"}</p>

</div>

`;



}



console.log("Rooms loading...");
}
window.addEventListener("DOMContentLoaded", () => {
  loadRooms();
  setInterval(loadRooms,60000);
});

/* TEACHER LOGIN */

window.openLogin=function(){

document.getElementById("loginModal").style.display="flex";

}

window.closeLogin=function(){

document.getElementById("loginModal").style.display="none";

}

window.login = async function(){

  const id = document.getElementById("teacherID").value;
  const pass = document.getElementById("teacherPass").value;

  const snapshot = await get(ref(database,"teachers/" + id));

  if(!snapshot.exists()){
    document.getElementById("loginMsg").innerHTML = "Invalid ID";
    return;
  }

  let dbPass = snapshot.val().password;

  try{
    dbPass = atob(dbPass); // decode if encrypted
  }catch(e){
    // old password (not encoded)
  }

  if(dbPass === pass){
    localStorage.setItem("teacherID", id);
    window.location.href = "teacher.html";
  }else{
    document.getElementById("loginMsg").innerHTML = "Wrong Password";
  }

}

/* ROOM FUTURE LECTURES */

window.openRoom = async function(room){

document.getElementById("roomModal").style.display="flex";

document.getElementById("roomTitle").innerHTML = room + " Today's Lectures";

const container = document.getElementById("futureLectures");

container.innerHTML = "Loading...";

const day = getCurrentDay();

const snapshot = await get(ref(database,`classrooms/${room}/timetable/${day}`));

if(!snapshot.exists()){

container.innerHTML = "No lectures scheduled today";

return;

}

const data = snapshot.val();

container.innerHTML="";

const slotOrder = ["s1","s2","s3","s4","s5","s6","s7","s8"];

const currentSlot = getCurrentTimeSlot();

container.innerHTML = "";

for(let slot of slotOrder){

  if(data[slot]){

    let highlight = slot === currentSlot ? "background:#ffeeba;" : "";

    container.innerHTML += `
      <div style="padding:8px; margin:5px; border-radius:5px; ${highlight}">
        <b>${slotMap[slot]}</b> — 
        ${data[slot].subject} (${data[slot].faculty})
      </div>
    `;
  }
}

}


window.closeRoom=function(){

document.getElementById("roomModal").style.display="none";

}

/* OPEN NOTICE BOARD */

window.openNoticeBoard = function(){

document.getElementById("noticeModal").style.display="flex";

const container=document.getElementById("allNotices");
container.innerHTML="Loading...";

const noticeRef = ref(database,"notice/current");

get(noticeRef).then((snapshot)=>{

container.innerHTML="";

if(!snapshot.exists()){
container.innerHTML="No notices available";
return;
}

const now=new Date();

snapshot.forEach(child=>{

const data=child.val();
const expiry=new Date(data.expiry);

if(now < expiry){

container.innerHTML += `

<div style="padding:10px; border-bottom:1px solid #ccc; margin-bottom:10px;">
📢 ${data.message}
<br>
<small>Valid Until: ${data.expiry}</small>
</div>

`;

}

});

});

}


/* CLOSE NOTICE BOARD */

window.closeNoticeBoard=function(){

document.getElementById("noticeModal").style.display="none";

}

window.getStudentMarks = async function(){

</tr>
`;
});
}else{
