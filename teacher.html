function isSameTeacher(a,b){

}

window.showToday = async function(){

const teacher = localStorage.getItem("teacherID");
const day = new Date().toLocaleString('en-US',{weekday:'long'});
const todayDate = new Date().toISOString().split("T")[0];

const snapshot = await get(ref(database,"classrooms"));

let html = "<h3>Today's Lectures</h3>";

if(!snapshot.exists()){
document.getElementById("content").innerHTML = "No data";
return;
}

const data = snapshot.val();

for(let room in data){

if(!data[room].timetable) continue;

const dayData = data[room].timetable[day];
if(!dayData) continue;

for(let slot in dayData){

const lec = dayData[slot];

// ✅ CANCEL CHECK
const cancelSnap = await get(ref(database,
`cancelled_lectures/${todayDate}/${room}/${slot}`));

if(cancelSnap.exists()) continue;

if(lec.faculty && lec.faculty.trim().toUpperCase() === teacher.trim().toUpperCase()){

html += `
<div class="card">
<b>Room:</b> ${room}<br>
<b>Subject:</b> ${lec.subject}<br>
<b>Slot:</b> ${slot}
</div>
`;

}

}

}

document.getElementById("content").innerHTML = html;

}

window.submitLate = async function(){

  const subject = document.getElementById("lateSubject").value;
  const date = document.getElementById("lateDate").value;
  const minutes = document.getElementById("lateMinutes").value;
  const teacher = localStorage.getItem("teacherID");

  if(!date || !minutes){
    alert("Fill all fields");
    return;
  }

  if(minutes > 60){
    alert("Too much delay");
    return;
  }

  // Find lecture details
  const day = new Date(date).toLocaleString('en-US',{weekday:'long'});
  const snapshot = await get(ref(database,"classrooms"));

  let found = null;

  if(snapshot.exists()){
    const data = snapshot.val();

    for(let room in data){
      const dayData = data[room].timetable?.[day];

      if(!dayData) continue;

      for(let slot in dayData){
        const lec = dayData[slot];

        if(lec.faculty === teacher && lec.subject === subject){
          found = {room, slot};
        }
      }
    }
  }

  if(!found){
    alert("Lecture not found");
    return;
  }

  // Save full data
  await set(ref(database,"late_notifications/"+Date.now()),{
    teacher: teacher,
    subject: subject,
    date: date,
    minutes: minutes,
    room: found.room,
    slot: found.slot,
    status: "late"
  });

  document.getElementById("lateMsg").innerHTML =
  "✅ Late notification sent";

}

width:320px;
">

<select id="subjectSelectMarks" style="
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
">
<option>Loading subjects...</option>
</select>

<input type="file" id="excelFile" accept=".xlsx, .xls" style="
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
background:#f9f9f9;
">

<button onclick="uploadExcel()" style="
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
"
onmouseover="this.style.background='#0056b3'"
onmouseout="this.style.background='#007bff'"
>
Upload & Save
</button>

<p id="marksMsg" style="
margin-top:15px;
font-weight:bold;
color:green;
"></p>

</div>

`;

const teacher = localStorage.getItem("teacherID");

const snapshot = await get(ref(database,"classrooms"));
const select = document.getElementById("subjectSelectMarks");

select.innerHTML = "";

let subjects = new Set();

if(snapshot.exists()){
  const data = snapshot.val();

  // ✅ TIMETABLE
  for(let room in data){
    if(data[room].timetable){
      for(let day in data[room].timetable){
        for(let slot in data[room].timetable[day]){

          const lec = data[room].timetable[day][slot];

          if(isSameTeacher(lec.faculty, teacher)){
            subjects.add(lec.subject);
          }

        }
      }
    }
  }

  // ✅ BOOKING REQUESTS
  const bookingSnap = await get(ref(database,"booking_requests"));
  if(bookingSnap.exists()){
    bookingSnap.forEach(child=>{
      const b = child.val();
      if(b.teacher === teacher){
        subjects.add(b.subject);
      }
    });
  }

  // ✅ LATE NOTIFICATIONS
  const lateSnap = await get(ref(database,"late_notifications"));
  if(lateSnap.exists()){
    lateSnap.forEach(child=>{
      const l = child.val();
      if(l.teacher === teacher){
        subjects.add(l.subject);
      }
    });
  }
}

// ✅ FILL DROPDOWN
if(subjects.size === 0){
  select.innerHTML = "<option>No subjects found</option>";
}else{
  subjects.forEach(sub=>{
    select.innerHTML += `<option>${sub}</option>`;
  });
}


};
window.addRow = function(){

const table = document.getElementById("marksTable");

const row = document.createElement("tr");

row.innerHTML = `
<td><input placeholder="Student ID"></td>
<td><input type="number" placeholder="Marks"></td>
`;

table.appendChild(row);

};
window.submitMarks = async function(){

const subject = document.getElementById("subjectSelectMarks").value.trim().toUpperCase();
const teacher = localStorage.getItem("teacherID");

const rows = document.querySelectorAll("#marksTable tr");

let count = 0;

for(let row of rows){

const inputs = row.querySelectorAll("input");

const studentID = inputs[0].value;
const marks = inputs[1].value;

if(!studentID || !marks) continue;

// validation
if(marks > 30){
alert("Max marks is 30");
return;
}

await set(ref(database, "marks/" + subject + "/" + studentID),{
midsem: marks,
teacher: teacher,
date: new Date().toISOString().split("T")[0]
});

count++;

}

document.getElementById("marksMsg").innerHTML =
"✅ Saved " + count + " students marks";

};
window.uploadExcel = async function(){

const file = document.getElementById("excelFile").files[0];

if(!file){
alert("Select Excel file");
return;
}

const subject = document.getElementById("subjectSelectMarks").value;
const teacher = localStorage.getItem("teacherID");

const reader = new FileReader();

reader.onload = async function(e){

const data = new Uint8Array(e.target.result);
const workbook = XLSX.read(data, {type: "array"});

const sheetName = workbook.SheetNames[0];
const sheet = workbook.Sheets[sheetName];

// convert to JSON
const jsonData = XLSX.utils.sheet_to_json(sheet);

let count = 0;

for(let row of jsonData){

// Excel columns MUST be like this:
// StudentID | Marks

const studentID = row.StudentID;
const marks = row.Marks;

if(!studentID || !marks) continue;

if(marks > 30){
alert("Marks > 30 not allowed");
return;
}

await set(ref(database, "marks/" + subject + "/" + studentID),{
midsem: marks,
teacher: teacher,
date: new Date().toISOString().split("T")[0]
});

count++;
}

document.getElementById("marksMsg").innerHTML =
"✅ Uploaded " + count + " students marks";

};

reader.readAsArrayBuffer(file);

};
window.viewMarks = async function(){

document.getElementById("content").innerHTML = `
<h3 style="color:#002147; margin-bottom:20px;">
📊 View Marks
</h3>

<div style="display:flex; justify-content:center;">
<div style="
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
width:350px;
text-align:center;
">

<select id="viewSubject" style="
width:100%;
padding:12px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
">
<option>Select Subject</option>
</select>

<div id="marksDisplay"></div>

</div>
</div>
`;

const teacher = localStorage.getItem("teacherID");

const snapshot = await get(ref(database,"classrooms"));
const select = document.getElementById("viewSubject");

let subjects = new Set();

if(snapshot.exists()){
  const data = snapshot.val();

  // ✅ TIMETABLE
  for(let room in data){
    if(data[room].timetable){
      for(let day in data[room].timetable){
        for(let slot in data[room].timetable[day]){

          const lec = data[room].timetable[day][slot];

          if(isSameTeacher(lec.faculty, teacher) && lec.subject){
           subjects.add(lec.subject.trim().toUpperCase());
          }

        }
      }
    }
  }

  // ✅ BOOKING REQUESTS
  const bookingSnap = await get(ref(database,"booking_requests"));
  if(bookingSnap.exists()){
    bookingSnap.forEach(child=>{
      const b = child.val();
      if(b.teacher === teacher && b.subject){
        subjects.add(b.subject);
      }
    });
  }

  // ✅ LATE NOTIFICATIONS
  const lateSnap = await get(ref(database,"late_notifications"));
  if(lateSnap.exists()){
    lateSnap.forEach(child=>{
      const l = child.val();
      if(l.teacher === teacher && l.subject){
        subjects.add(l.subject);
      }
    });
  }
}

// ✅ FILL DROPDOWN
select.innerHTML = "<option>Select Subject</option>";

subjects.forEach(sub=>{
  select.innerHTML += `<option>${sub}</option>`;
});

// when subject selected
select.addEventListener("change", async function(){

const subject = this.value;

const marksSnap = await get(ref(database,"marks/" + subject.trim()));

let html = `
<table class="marks-table">
<tr style="background:#002147;color:white;">
<th style="padding:10px;">Student ID</th>
<th style="padding:10px;">Marks</th>
</tr>
`;

if(marksSnap.exists()){
  marksSnap.forEach(child=>{
    const data = child.val();

    html += `
    <tr style="border-bottom:1px solid #ddd;">
    <td style="padding:10px;">${child.key}</td>
    <td style="padding:10px;">${data.midsem}</td>
    </tr>
    `;
  });
}else{
  html += `<tr><td colspan="2">No data</td></tr>`;
}

html += "</table>";

document.getElementById("marksDisplay").innerHTML = html;

});

};

import { onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

window.showNotifications = function(){

const teacher = localStorage.getItem("teacherID");

onValue(ref(database,"notifications"), (snapshot)=>{

let html = "<h3>🔔 Notifications</h3>";

if(!snapshot.exists()){
  document.getElementById("content").innerHTML = "No notifications";
  return;
}

const now = new Date();

snapshot.forEach(child=>{
  const data = child.val();

  // ✅ FILTER: only for this teacher + not expired
  if(data.teacher === teacher){

    if(data.expiry && new Date(data.expiry) < now){
      return; // skip expired
    }

    html += `
    <div class="card">
      <b>${data.message}</b><br>
      <small>${new Date(data.time).toLocaleString()}</small>
    </div>
    `;
  }

});

document.getElementById("content").innerHTML = html;

});
}
</script>
