<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAFSLRyN4W5VRg4atDPq7Pae0Kl8-RVP30",
authDomain: "smart-classroom-allocation.firebaseapp.com",
databaseURL: "https://smart-classroom-allocation-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "smart-classroom-allocation"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const teacherID = localStorage.getItem("teacherID");

const teacherRef = ref(database, "teachers/" + teacherID);

get(teacherRef).then((snapshot) => {

if(snapshot.exists()){

const name = snapshot.val().name;

document.getElementById("teacherName").innerText =
"Welcome " + name;

}
else{

document.getElementById("teacherName").innerText =
"Welcome " + teacherID;

}

});

window.showToday = async function(){

const teacher = localStorage.getItem("teacherID");
const day = new Date().toLocaleString('en-US',{weekday:'long'});

const snapshot = await get(ref(database,"classrooms"));

let html = "<h3>Today's Lectures</h3>";

if(!snapshot.exists()){
document.getElementById("content").innerHTML = "No data";
return;
}

const data = snapshot.val();

for(let room in data){

if(!data[room].timetable) continue;

const dayData = data[room].timetable[day];

if(!dayData) continue;

for(let slot in dayData){

if(dayData[slot].faculty === teacher){

html += `
<div class="card">
<b>Room:</b> ${room}<br>
<b>Subject:</b> ${dayData[slot].subject}<br>
<b>Slot:</b> ${slot}
</div>
`;

}

}

}

document.getElementById("content").innerHTML = html;

}

window.showWeekly = async function(){

const teacher = localStorage.getItem("teacherID");

const snapshot = await get(ref(database,"classrooms"));

let html = "<h3>Weekly Lectures</h3>";

if(!snapshot.exists()){
document.getElementById("content").innerHTML = "No data";
return;
}

const data = snapshot.val();

for(let room in data){

if(!data[room].timetable) continue;

for(let day in data[room].timetable){

for(let slot in data[room].timetable[day]){

const lec = data[room].timetable[day][slot];

if(lec.faculty === teacher){

html += `
<div class="card">
<b>Day:</b> ${day}<br>
<b>Room:</b> ${room}<br>
<b>Subject:</b> ${lec.subject}<br>
<b>Slot:</b> ${slot}
</div>
`;

}

}

}

}

document.getElementById("content").innerHTML = html;

}

window.showLogs = async function(){

const teacher = localStorage.getItem("teacherID");

const snapshot = await get(ref(database,"rfid_logs"));

let html = "<h3>RFID Logs</h3>";

if(!snapshot.exists()){
document.getElementById("content").innerHTML = "No logs";
return;
}

snapshot.forEach(child=>{

const data = child.val();

if(data.teacher === teacher){

html += `
<div class="card">
<b>Room:</b> ${data.room}<br>
<b>Time:</b> ${data.time}<br>
<b>Status:</b> ${data.status}
</div>
`;

}

});

document.getElementById("content").innerHTML = html;

}
window.showBooking = async function(){

document.getElementById("content").innerHTML = `

<h3>Classroom Booking</h3>

<select id="room">
<option>LAB31</option>
<option>CR125</option>
<option>CR126</option>
</select>

<br><br>

<input type="date" id="date">

<br><br>

<select id="slot">
<option value="s1">8:30-9:30</option>
<option value="s2">9:30-10:30</option>
<option value="s3">10:40-11:40</option>
<option value="s4">11:40-12:40</option>
<option value="s5">1:20-2:20</option>
<option value="s6">2:20-3:20</option>
<option value="s7">3:20-4:20</option>
</select>

<br><br>

<select id="subjectSelect">
<option>Loading subjects...</option>
</select>

<br><br>

<input id="purpose" placeholder="Purpose">

<br><br>

<button onclick="submitBooking()">Request Booking</button>

<p id="bookingMsg"></p>

`;

const teacher = localStorage.getItem("teacherID");


const snapshot = await get(ref(database,"classrooms"));

const select = document.getElementById("subjectSelect");

select.innerHTML = "";

let subjects = new Set();

if(snapshot.exists()){

const data = snapshot.val();

for(let room in data){

if(!data[room].timetable) continue;

for(let day in data[room].timetable){

for(let slot in data[room].timetable[day]){

const lec = data[room].timetable[day][slot];

if(lec.faculty === teacher){
subjects.add(lec.subject);
}

}

}

}

}

if(subjects.size === 0){
select.innerHTML = "<option>No subjects found</option>";
}else{
subjects.forEach(sub=>{
select.innerHTML += `<option>${sub}</option>`;
});
}
}
window.submitBooking = async function(){

const room = document.getElementById("room").value;
const date = document.getElementById("date").value;
const slot = document.getElementById("slot").value;
const subject = document.getElementById("subjectSelect").value;
const purpose = document.getElementById("purpose").value;

const teacher = localStorage.getItem("teacherID");

const requestRef = ref(database, "booking_requests/" + Date.now());

await set(requestRef,{

teacher: teacher,
room: room,
date: date,
slot: slot,
subject: subject,
purpose: purpose,
status: "pending"

});

document.getElementById("bookingMsg").innerHTML =
"Booking Request Sent";

}
window.goHome = function(){

window.location.href = "index.html";

}
window.logout = function(){

localStorage.removeItem("teacherID");

window.location.href = "index.html";

}
