<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#002147;
color:white;
padding:20px;
text-align:center;
position:relative;
}

.logoutBtn{
position:absolute;
right:20px;
top:20px;
padding:8px 15px;
border:none;
background:white;
color:#002147;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.logoutBtn:hover{
background:#1b3a6b;
color:white;
}

.menu{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.menu button{
padding:10px 20px;
margin:5px;
border:none;
background:white;
color:#002147;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.menu button:hover{
background:#002147;
color:white;
}

.menu button:hover{
background:#0056b3;
}

#content{
padding:40px;
text-align:center;
}

.card{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
display:inline-block;
width:300px;
}

/* NAVBAR */

.navbar{
background:#1b3a6b;
padding:10px;
text-align:center;
}

.navbar button{
padding:10px 20px;
margin:5px;
border:none;
background:white;
cursor:pointer;
border-radius:5px;
font-size:14px;
}

.navbar button:hover{
background:#002147;
color:white;
}

</style>

</head>

<body>

<header>

<h2>Teacher Dashboard</h2>

<h3 id="teacherName"></h3>

<button class="logoutBtn" onclick="logout()">Logout</button>

</header>

<button onclick="goHome()">Home</button>

<button onclick="showToday()">Today's Lectures</button>

<div class="navbar">

<button onclick="showToday()">Today's Lectures</button>

<button onclick="showWeekly()">Weekly Timetable</button>

<button onclick="showCancel()">Cancel Lecture</button>

<button onclick="showLate()">Late</button>

<button onclick="showBooking()">Book Classroom</button>

<button onclick="showLogs()">RFID Logs</button>



</div>

<div id="content">

Select a menu

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAFSLRyN4W5VRg4atDPq7Pae0Kl8-RVP30",
authDomain: "smart-classroom-allocation.firebaseapp.com",
databaseURL: "https://smart-classroom-allocation-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "smart-classroom-allocation"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const teacherID = localStorage.getItem("teacherID");

document.getElementById("teacherName").innerText =
"Welcome " + teacherID;

window.showToday = function(){

document.getElementById("content").innerHTML =
"<h3>Today's lectures will appear here</h3>";

}

window.showWeekly = function(){

document.getElementById("content").innerHTML =
"<h3>Weekly timetable will appear here</h3>";

}

window.showLogs = function(){

document.getElementById("content").innerHTML =
"<h3>RFID logs will appear here</h3>";

}
window.showBooking = function(){

document.getElementById("content").innerHTML = `

<h3>Classroom Booking</h3>

<select id="room">
<option>LAB31</option>
<option>CR125</option>
<option>CR126</option>
</select>

<br><br>

<input type="date" id="date">

<br><br>

<select id="slot">
<option>8:30-9:30</option>
<option>9:30-10:30</option>
<option>10:40-11:40</option>
<option>11:40-12:40</option>
<option>1:20-2:20</option>
<option>2:20-3:20</option>
<option>3:20-4:20</option>
</select>

<br><br>

<input id="purpose" placeholder="Purpose">

<br><br>

<button onclick="submitBooking()">Request Booking</button>

<p id="bookingMsg"></p>

`;

}
window.submitBooking = async function(){

const room = document.getElementById("room").value;
const date = document.getElementById("date").value;
const slot = document.getElementById("slot").value;
const purpose = document.getElementById("purpose").value;

const teacher = localStorage.getItem("teacherID");

const requestRef = ref(database, "booking_requests/" + Date.now());

await set(requestRef,{

teacher: teacher,
room: room,
date: date,
slot: slot,
purpose: purpose,
status: "pending"

});

document.getElementById("bookingMsg").innerHTML =
"Booking Request Sent";

}
window.goHome = function(){

window.location.href = "index.html";

}
window.logout = function(){

localStorage.removeItem("teacherID");

window.location.href = "index.html";

}
window.showCancel = function(){

document.getElementById("content").innerHTML = `

<h3>Cancel Lecture</h3>

<select id="cancelSubject">

<option>Web Technology</option>
<option>Artificial Intelligence</option>
<option>Database</option>

</select>

<br><br>

<input type="date" id="cancelDate">

<br><br>

<select id="cancelSlot">

<option>8:30-9:30</option>
<option>9:30-10:30</option>
<option>10:40-11:40</option>
<option>11:40-12:40</option>
<option>1:20-2:20</option>
<option>2:20-3:20</option>
<option>3:20-4:20</option>

</select>

<br><br>

<button onclick="cancelLecture()">Cancel Lecture</button>

<p id="cancelMsg"></p>

`;

}

window.cancelLecture = function(){

document.getElementById("cancelMsg").innerHTML =
"Lecture Cancelled Successfully";

}
window.showLate = function(){

document.getElementById("content").innerHTML = `

<h3>Teacher Late Notification</h3>

<select id="lateSubject">

<option>MIT</option>
<option>ADE</option>
<option>DSP</option>

</select>

<br><br>

<input type="date" id="lateDate">

<br><br>

<select id="lateSlot">

<option>8:30-9:30</option>
<option>9:30-10:30</option>
<option>10:40-11:40</option>
<option>11:40-12:40</option>
<option>1:20-2:20</option>
<option>2:20-3:20</option>
<option>3:20-4:20</option>

</select>

<br><br>

<input id="lateMinutes" placeholder="Late minutes">

<br><br>

<button onclick="submitLate()">Submit Late</button>

<p id="lateMsg"></p>

`;

}

window.submitLate = async function(){

const subject=document.getElementById("lateSubject").value;
const date=document.getElementById("lateDate").value;
const slot=document.getElementById("lateSlot").value;
const minutes=document.getElementById("lateMinutes").value;

const teacher=localStorage.getItem("teacherID");

await set(ref(database,"late_notifications/"+Date.now()),{

teacher:teacher,
subject:subject,
date:date,
slot:slot,
minutes:minutes,
status:"late"

});

document.getElementById("lateMsg").innerHTML=
"Late notification sent";

}
</script>

</body>
</html>
